services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: btp_life
    ports:
      - '5432:5432'
    volumes:
      - btp_life_pgdata:/var/lib/postgresql/data

volumes:
  btp_life_pgdata:
