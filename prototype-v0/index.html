<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BTP Life — Le simulateur de carrière BTP</title>
<meta name="description" content="Choisis ton métier. Apprends. Travaille. Évolue. Construis ta carrière dans le BTP.">
<meta name="theme-color" content="#26262B">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%2326262B'/><path d='M14 50h36M18 50V34h10v16M32 50V22h10v28M18 34l10-6M32 22l10-8' stroke='%23BC4B27' stroke-width='3.5' fill='none' stroke-linecap='round'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@75..125,400..900&family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --terre:#BC4B27; --terre-f:#9A3B1D; --cuivre:#B87333; --olive:#6B7A3F; --olive-c:#8A9A55;
  --graphite:#26262B; --graphite-2:#33333A; --ivoire:#F4EEE2; --pierre:#E9DFCC; --sable:#D9B382;
  --brun:#3F2E24; --mineral:#8A8680; --blanc:#FFFDF8; --rouge:#A63B2A; --ok:#5C7A34;
  --r:14px; --sh:0 2px 10px rgba(38,38,43,.08), 0 10px 30px rgba(38,38,43,.07);
  --display:'Archivo',system-ui,sans-serif; --body:'Public Sans',system-ui,sans-serif; --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--body);background:var(--ivoire);color:var(--graphite);line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--display);line-height:1.12;letter-spacing:-.01em}
a{color:inherit}
button{font-family:inherit;cursor:pointer}
img,svg{display:block}
.wrap{max-width:1100px;margin:0 auto;padding:0 20px}
/* cotation divider — signature technique */
.cote{display:flex;align-items:center;gap:10px;color:var(--mineral);font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.14em;margin:0 0 14px}
.cote::before,.cote::after{content:"";flex:1;border-top:1px dashed var(--mineral);opacity:.55}
.cote::before{max-width:34px;flex:0 0 34px}
.cote i{font-style:normal;color:var(--terre)}
/* boutons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:10px;padding:13px 22px;font-weight:700;font-size:15px;transition:transform .12s,box-shadow .12s;text-decoration:none}
.btn:active{transform:translateY(1px)}
.btn-p{background:var(--terre);color:var(--blanc);box-shadow:0 4px 14px rgba(188,75,39,.35)}
.btn-p:hover{background:var(--terre-f)}
.btn-o{background:transparent;color:var(--ivoire);border:1.5px solid rgba(244,238,226,.4)}
.btn-o:hover{border-color:var(--ivoire)}
.btn-g{background:var(--pierre);color:var(--graphite)}
.btn-g:hover{background:var(--sable)}
.btn-olive{background:var(--olive);color:var(--blanc)}
.btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:8px}
/* header */
header.site{position:sticky;top:0;z-index:50;background:rgba(38,38,43,.94);backdrop-filter:blur(8px);color:var(--ivoire)}
header.site .wrap{display:flex;align-items:center;gap:18px;height:64px}
.logo{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:800;font-size:19px;letter-spacing:.01em;text-decoration:none}
.logo b{color:var(--terre)}
nav.main{margin-left:auto;display:flex;gap:6px;align-items:center}
nav.main a{padding:8px 12px;border-radius:8px;font-size:14px;font-weight:600;text-decoration:none;opacity:.85}
nav.main a:hover{background:var(--graphite-2);opacity:1}
/* hero */
.hero{background:var(--graphite);color:var(--ivoire);position:relative;overflow:hidden}
.hero .grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(244,238,226,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(244,238,226,.05) 1px,transparent 1px);background-size:44px 44px;pointer-events:none}
.hero .wrap{position:relative;display:grid;grid-template-columns:1.15fr .85fr;gap:40px;padding:84px 20px 90px;align-items:center}
.eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--cuivre);margin-bottom:16px}
.hero h1{font-size:clamp(34px,5.2vw,58px);font-weight:850;font-stretch:112%}
.hero h1 em{font-style:normal;color:var(--terre);position:relative}
.hero p.sub{margin:20px 0 30px;font-size:17px;opacity:.85;max-width:52ch}
.hero .ctas{display:flex;gap:12px;flex-wrap:wrap}
.hero-visual{filter:drop-shadow(0 20px 40px rgba(0,0,0,.35))}
/* sections publiques */
section.pub{padding:72px 0}
section.pub.alt{background:var(--pierre)}
section.pub h2{font-size:clamp(26px,3.4vw,38px);margin-bottom:14px;font-weight:800}
.lead{font-size:17px;max-width:64ch;color:#4a463f}
.cards{display:grid;gap:16px;margin-top:34px}
.cards.c4{grid-template-columns:repeat(4,1fr)}
.cards.c3{grid-template-columns:repeat(3,1fr)}
.card{background:var(--blanc);border:1px solid rgba(63,46,36,.1);border-radius:var(--r);padding:22px;box-shadow:var(--sh)}
.card .num{font-family:var(--mono);color:var(--terre);font-size:12px;letter-spacing:.12em}
.card h3{font-size:17px;margin:8px 0 6px}
.card p{font-size:14px;color:#5b564d}
.metier{display:flex;flex-direction:column;gap:8px}
.metier .ic{width:44px;height:44px;border-radius:10px;display:grid;place-items:center;font-size:22px;background:var(--pierre)}
.metier button{margin-top:auto;align-self:start}
.fam{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--olive)}
.cta-final{background:var(--graphite);color:var(--ivoire);text-align:center;padding:80px 20px}
.cta-final h2{font-size:clamp(26px,4vw,42px);margin-bottom:10px}
footer.site{background:var(--brun);color:#e8ddce;padding:36px 0;font-size:13px}
footer.site .wrap{display:flex;flex-wrap:wrap;gap:20px;justify-content:space-between}
.avert{max-width:70ch;opacity:.8;font-size:12px;line-height:1.6}
/* ============ APP ============ */
.app-shell{min-height:100dvh;display:flex;flex-direction:column}
.app-main{flex:1;padding:22px 0 92px}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:var(--graphite);display:flex;justify-content:space-around;padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:60}
.tabbar a{flex:1;max-width:110px;display:flex;flex-direction:column;align-items:center;gap:3px;color:rgba(244,238,226,.65);font-size:10.5px;font-weight:600;text-decoration:none;padding:6px 2px;border-radius:10px}
.tabbar a.on{color:var(--terre)}
.tabbar a span.i{font-size:19px}
/* dashboard */
.dash-head{background:var(--graphite);color:var(--ivoire);border-radius:var(--r);padding:22px;display:grid;grid-template-columns:auto 1fr auto;gap:18px;align-items:center}
.avatar-chip{width:64px;height:64px;border-radius:14px;display:grid;place-items:center;font-size:32px;border:2px solid var(--cuivre)}
.dash-head h2{font-size:20px}
.dash-head .role{font-family:var(--mono);font-size:12px;color:var(--cuivre);letter-spacing:.08em;text-transform:uppercase}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0}
.stat{background:var(--blanc);border-radius:12px;padding:14px;border:1px solid rgba(63,46,36,.1)}
.stat b{font-family:var(--mono);font-size:20px;display:block}
.stat span{font-size:11.5px;color:var(--mineral);text-transform:uppercase;letter-spacing:.08em}
.panel{background:var(--blanc);border:1px solid rgba(63,46,36,.1);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:var(--sh)}
.panel h3{font-size:16px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px dashed rgba(138,134,128,.35)}
.row:last-child{border-bottom:none}
.pill{font-family:var(--mono);font-size:11px;padding:3px 9px;border-radius:99px;background:var(--pierre);white-space:nowrap}
.pill.ok{background:#e2ead1;color:var(--ok)}
.pill.ko{background:#f2ddd6;color:var(--rouge)}
.pill.terre{background:var(--terre);color:#fff}
.bar{height:9px;background:var(--pierre);border-radius:99px;overflow:hidden}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--terre),var(--cuivre));border-radius:99px;transition:width .5s}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.muted{color:var(--mineral);font-size:13px}
/* immeuble XP — signature */
.building{display:flex;align-items:flex-end;gap:14px}
.building svg{flex:0 0 auto}
/* missions */
.miss-card{display:flex;gap:14px;align-items:flex-start}
.miss-card .tag{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--olive)}
.chrono-ring{font-family:var(--mono);font-weight:600;color:var(--terre);border:2px solid var(--terre);border-radius:99px;padding:6px 14px;font-size:15px}
.q-opt{display:block;width:100%;text-align:left;background:var(--blanc);border:1.5px solid rgba(63,46,36,.18);border-radius:11px;padding:14px;margin-bottom:10px;font-size:15px;transition:.12s}
.q-opt:hover{border-color:var(--terre)}
.q-opt.sel{border-color:var(--terre);background:#faf0ea}
.q-opt.good{border-color:var(--ok);background:#eef3e3}
.q-opt.bad{border-color:var(--rouge);background:#f8e7e2}
input.num,input.txt,select.sel,textarea{width:100%;padding:12px;border:1.5px solid rgba(63,46,36,.22);border-radius:10px;font-family:var(--body);font-size:15px;background:var(--blanc)}
input.num{font-family:var(--mono)}
label.f{display:block;font-size:13px;font-weight:600;margin:14px 0 6px}
.correction{background:var(--pierre);border-left:4px solid var(--cuivre);border-radius:0 10px 10px 0;padding:14px;font-size:14px;margin-top:10px}
.score-big{font-family:var(--mono);font-size:56px;font-weight:600;color:var(--terre);line-height:1}
.badge-tile{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;padding:14px 8px;border-radius:12px;background:var(--blanc);border:1px solid rgba(63,46,36,.1)}
.badge-tile .em{font-size:30px;width:56px;height:56px;display:grid;place-items:center;border-radius:99px;background:var(--pierre)}
.badge-tile.locked{opacity:.38;filter:grayscale(1)}
.badge-tile b{font-size:12px}
.grid-badges{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}
/* onboarding */
.onb{max-width:640px;margin:0 auto}
.steps{display:flex;gap:6px;margin:18px 0 26px}
.steps i{flex:1;height:6px;border-radius:99px;background:var(--pierre)}
.steps i.on{background:var(--terre)}
.choice-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.choice{border:1.5px solid rgba(63,46,36,.18);background:var(--blanc);border-radius:12px;padding:14px 10px;text-align:center;font-size:13.5px;font-weight:600}
.choice.sel{border-color:var(--terre);background:#faf0ea;box-shadow:0 0 0 1px var(--terre)}
.choice .em{font-size:26px;display:block;margin-bottom:6px}
/* celebration */
.celebrate{position:fixed;inset:0;background:rgba(38,38,43,.55);display:grid;place-items:center;z-index:100;padding:20px}
.celebrate .box{background:var(--ivoire);border-radius:18px;max-width:440px;width:100%;padding:32px;text-align:center;animation:pop .35s cubic-bezier(.2,1.4,.4,1)}
@keyframes pop{from{transform:scale(.8);opacity:0}}
.confetti{font-size:44px;animation:bounce .8s ease infinite alternate}
@keyframes bounce{to{transform:translateY(-8px)}}
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--graphite);color:var(--ivoire);padding:12px 20px;border-radius:99px;font-size:14px;z-index:90;box-shadow:0 8px 24px rgba(0,0,0,.3);animation:pop .3s}
.hidden{display:none!important}
.cv-doc{background:var(--blanc);border:1px solid rgba(63,46,36,.15);border-radius:var(--r);padding:28px;font-size:14px}
.cv-doc h2{border-bottom:3px solid var(--terre);padding-bottom:8px;margin-bottom:4px}
.cv-sec{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--terre);margin:20px 0 8px}
.tagchip{display:inline-block;background:var(--pierre);border-radius:99px;padding:4px 12px;font-size:12.5px;margin:0 6px 6px 0;font-weight:600}
.warn-band{background:#efe6d2;border:1px dashed var(--cuivre);border-radius:10px;padding:10px 14px;font-size:12px;color:#6a5136;margin:14px 0}
@media(max-width:880px){
  .hero .wrap{grid-template-columns:1fr;padding:56px 20px 64px}
  .hero-visual{max-width:420px;margin:0 auto}
  .cards.c4,.cards.c3{grid-template-columns:repeat(2,1fr)}
  .stats{grid-template-columns:repeat(2,1fr)}
  .grid2{grid-template-columns:1fr}
  nav.main a.hidemob{display:none}
  .dash-head{grid-template-columns:auto 1fr}
}
@media(max-width:520px){.cards.c4,.cards.c3{grid-template-columns:1fr}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="root"></div>
<div id="overlay"></div>
<script>
/* ================= BTP LIFE — DONNÉES ================= */
const PAYS = {
  CI:{nom:"Côte d'Ivoire",devise:"FCFA",prix:{ciment:5500,sable:15000,gravier:20000,fer12:6000,agglo15:350,mo_j:5000},unSac:"sac 50 kg",norme:"Référentiel pédagogique CI"},
  FR:{nom:"France",devise:"€",prix:{ciment:9,sable:45,gravier:55,fer12:11,agglo15:1.4,mo_j:180},unSac:"sac 35 kg",norme:"Référentiel pédagogique FR (Eurocodes)"}
};
const PROFILS = [
  {id:"etudiant",nom:"Étudiant BTP",em:"🎓",fam:"Formation",niv:1,desc:"Tu découvres le BTP : bases, sécurité, matériaux, lecture de plans."},
  {id:"stagiaire",nom:"Stagiaire",em:"📋",fam:"Chantier",niv:2,desc:"Tu observes, rédiges des rapports journaliers et assistes l'équipe."},
  {id:"ouvrier",nom:"Ouvrier",em:"🧱",fam:"Chantier",niv:2,desc:"Tu exécutes : maçonnerie, ferraillage, coffrage, dans les règles de sécurité."},
  {id:"technicien",nom:"Technicien junior",em:"🛠️",fam:"Chantier",niv:3,desc:"Tu maîtrises les plans, le métré de base et les outils bureautiques BTP."},
  {id:"chef_equipe",nom:"Chef d'équipe",em:"👷",fam:"Chantier",niv:4,desc:"Tu diriges 3 à 8 ouvriers : consignes, sécurité, rendement."},
  {id:"chef_chantier",nom:"Chef chantier",em:"🏗️",fam:"Chantier",niv:5,desc:"Tu pilotes un chantier complet : qualité, sécurité, avancement."},
  {id:"conducteur",nom:"Conducteur de travaux",em:"📐",fam:"Chantier",niv:7,desc:"Tu gères plusieurs chantiers : budget, planning, fournisseurs, client."},
  {id:"dessinateur",nom:"Dessinateur",em:"✏️",fam:"Bureau d'études",niv:3,desc:"Tu produis et corriges les plans AutoCAD du bureau d'études."},
  {id:"bim",nom:"BIM modeleur",em:"🧊",fam:"Bureau d'études",niv:5,desc:"Tu construis la maquette numérique Revit du projet."},
  {id:"topographe",nom:"Topographe",em:"🗺️",fam:"Topographie",niv:4,desc:"Tu implantes les ouvrages et lèves le terrain."},
  {id:"geotechnicien",nom:"Géotechnicien",em:"🪨",fam:"Géotechnique",niv:5,desc:"Tu analyses les sols et recommandes les fondations."},
  {id:"metreur",nom:"Métreur",em:"🧮",fam:"Métré / Devis",niv:4,desc:"Tu quantifies les ouvrages et chiffres les devis."},
  {id:"controleur",nom:"Contrôleur qualité",em:"🔍",fam:"Qualité / HSE",niv:5,desc:"Tu contrôles la conformité et rédiges les non-conformités."},
  {id:"hse",nom:"Responsable HSE",em:"🦺",fam:"Qualité / HSE",niv:5,desc:"Tu fais respecter la sécurité, jusqu'à arrêter une tâche dangereuse."},
  {id:"entrepreneur",nom:"Entrepreneur BTP",em:"💼",fam:"Entrepreneuriat",niv:6,desc:"Tu cherches des marchés, recrutes et développes ton entreprise."},
  {id:"ingenieur",nom:"Ingénieur structure",em:"🏛️",fam:"Bureau d'études",niv:7,desc:"Tu valides les solutions techniques et les notes de calcul."}
];
const METIERS = ["Chef chantier","Conducteur de travaux","Ingénieur structure","Ingénieur géotechnique","Topographe","Dessinateur AutoCAD","BIM modeleur","Métreur","Responsable HSE","Entrepreneur BTP","Chef de projet"];
const COMP = {
  bases:{nom:"Bases BTP",em:"🏠"}, securite:{nom:"Sécurité",em:"🦺"}, materiaux:{nom:"Matériaux",em:"🧱"},
  plans:{nom:"Lecture de plans",em:"📐"}, beton:{nom:"Béton & ferraillage",em:"🪣"}, metre:{nom:"Métré & devis",em:"🧮"},
  excel:{nom:"Excel BTP",em:"📊"}, word:{nom:"Word / Rapports",em:"📝"}, gestion:{nom:"Gestion humaine",em:"🤝"},
  decision:{nom:"Décision chantier",em:"⚖️"}, geotech:{nom:"Géotechnique",em:"🪨"}, topo:{nom:"Topographie",em:"🗺️"},
  qualite:{nom:"Contrôle qualité",em:"🔍"}
};
const PARCOURS_TYPES = {
  "Conducteur de travaux":["etudiant","stagiaire","technicien","chef_equipe","chef_chantier","conducteur"],
  "Chef chantier":["etudiant","stagiaire","technicien","chef_equipe","chef_chantier"],
  default:["etudiant","stagiaire","technicien","chef_equipe","chef_chantier","conducteur"]
};
const BADGES = [
  {id:"secu1",nom:"Sécurité N1",em:"🦺",cond:s=>(s.comp.securite||0)>=1},
  {id:"rapport",nom:"Rapport journalier",em:"📝",cond:s=>s.done["m-rapport"]},
  {id:"excel",nom:"Excel BTP",em:"📊",cond:s=>s.done["m-excel-volume"]},
  {id:"plans",nom:"Lecture de plans",em:"📐",cond:s=>(s.comp.plans||0)>=1},
  {id:"beton1",nom:"Béton N1",em:"🪣",cond:s=>s.done["m-dosage"]},
  {id:"ferraillage",nom:"Ferraillage",em:"🔩",cond:s=>s.done["m-ferraillage"]},
  {id:"stagiaire_ok",nom:"Stagiaire validé",em:"🎖️",cond:s=>s.profil!=="etudiant"&&s.profil!=="stagiaire"},
  {id:"gestion",nom:"Gestion humaine",em:"🤝",cond:s=>(s.comp.gestion||0)>=1},
  {id:"geo1",nom:"Géotechnique init.",em:"🪨",cond:s=>(s.comp.geotech||0)>=1},
  {id:"topo1",nom:"Topographie init.",em:"🗺️",cond:s=>(s.comp.topo||0)>=1},
  {id:"qualite1",nom:"Contrôle qualité",em:"🔍",cond:s=>(s.comp.qualite||0)>=1},
  {id:"serie3",nom:"Série de 3",em:"🔥",cond:s=>s.streak>=3},
  {id:"perseverant",nom:"Persévérant",em:"💪",cond:s=>s.retryWin},
  {id:"chantier1",nom:"Premier chantier",em:"🏗️",cond:s=>Object.values(s.chantiers||{}).some(c=>c.fini)}
];
const COURS = [
  {id:"c1",titre:"Introduction au BTP",em:"🏠",comp:"bases",texte:"Le BTP regroupe le Bâtiment (logements, écoles, bureaux) et les Travaux Publics (routes, ponts, réseaux). Un projet suit toujours la même chaîne : besoin du client → études → exécution → réception → maintenance. Chaque métier intervient à une étape précise.",quiz:{q:"Que signifie BTP ?",opts:["Bâtiment et Travaux Publics","Béton et Techniques de Pose","Bureau Technique de Projet"],ok:0}},
  {id:"c2",titre:"Les acteurs d'un projet",em:"👥",comp:"bases",texte:"Le maître d'ouvrage (client) définit le besoin et paie. Le maître d'œuvre (architecte / bureau d'études) conçoit et suit les travaux. L'entreprise exécute. Le bureau de contrôle vérifie la conformité. Le laboratoire teste les matériaux et les sols.",quiz:{q:"Qui paie le projet ?",opts:["Le maître d'œuvre","Le maître d'ouvrage","L'entreprise"],ok:1}},
  {id:"c3",titre:"Sécurité chantier & EPI",em:"🦺",comp:"securite",texte:"Les EPI (Équipements de Protection Individuelle) sont obligatoires : casque, chaussures de sécurité, gilet haute visibilité, gants, et selon les tâches : lunettes, harnais, masque. La règle d'or : on n'entre jamais sur un chantier sans EPI, et un danger grave justifie l'arrêt immédiat de la tâche.",quiz:{q:"Un ouvrier travaille en hauteur sans harnais. Que fais-tu ?",opts:["Je le laisse finir, c'est rapide","J'arrête la tâche immédiatement","Je préviens à la pause"],ok:1}},

  const missOK=Object.keys(s.done).length>=(p.cond.missions||0);

let PLAY=null;
function vMission(id){
  const s=S(); if(!s){go("/auth");return;}
  const m=MISSIONS.find(x=>x.id===id); if(!m){go("/missions");return;}
  if(!missAccessible(s,m)){toast("🔒 Niveau "+m.niv+" requis");go("/missions");return;}
  PLAY={m,i:0,pts:0,max:0,answers:[],start:Date.now(),retry:!!s.done[id]};
  root.innerHTML=appShell("missions",`
  <div class="panel"><div class="cote"><i>${m.cat}</i> ${m.type.toUpperCase()}${m.exam?" · EXAMEN":""}</div>

  <div id="q-zone" style="margin-top:14px"></div></div>`);
  if(m.tps){ PLAY.left=m.tps; PLAY.timer=setInterval(()=>{ PLAY.left--; const el=document.getElementById("chrono");
    if(el)el.textContent=fmtT(PLAY.left); if(PLAY.left<=0){clearInterval(PLAY.timer); finishMission(true);} },1000); }
  renderQ();

function fmtT(t){ return String(Math.floor(t/60)).padStart(2,"0")+":"+String(t%60).padStart(2,"0"); }
function renderQ(){
  const {m,i}=PLAY, s=S(), zone=document.getElementById("q-zone");
  const list=m.qs||m.etapes;
  if(i>=list.length){ finishMission(false); return; }
  const q=list[i];
  const head=`<div class="cote"><i>Q${i+1}/${list.length}</i></div>`;
  if(m.type==="calc"||m.type==="devis"){
    zone.innerHTML=`${head}<h3>${q.q.replace("{DEVISE}",devise(s)).replace("{PAGGLO}",fmt(PAYS[s.pays].prix.agglo15))}</h3>
    <div style="display:flex;gap:10px;margin-top:12px"><input class="num" id="calc-in" type="number" step="any" placeholder="Ta réponse"><span style="align-self:center;font-family:var(--mono)">${q.unite}</span></div>
    <button class="btn btn-p" style="margin-top:14px" onclick="answerCalc()">Valider</button><div id="fb"></div>`;
    document.getElementById("calc-in").focus();
  } else if(m.type==="decision"){
    zone.innerHTML=`${head}<h3>${q.q}</h3><div style="margin-top:12px">${q.opts.map((o,j)=>`<button class="q-opt" onclick="answerDecision(${j})">${o.t}</button>`).join("")}</div><div id="fb"></div>`;
  } else {
    zone.innerHTML=`${head}<h3>${q.q}</h3><div style="margin-top:12px">${q.opts.map((o,j)=>`<button class="q-opt" onclick="answerQuiz(${j})">${o}</button>`).join("")}</div><div id="fb"></div>`;
  }
}
window.answerQuiz=function(j){
  const {m,i}=PLAY,q=(m.qs)[i]; PLAY.max+=100;
  const ok=j===q.ok; if(ok)PLAY.pts+=100;
  document.querySelectorAll(".q-opt").forEach((b,k)=>{b.disabled=true; if(k===q.ok)b.classList.add("good"); else if(k===j)b.classList.add("bad");});
  document.getElementById("fb").innerHTML=`<div class="correction"><b>${ok?"✅ Bonne réponse !":"❌ Pas encore."}</b> ${q.corr}</div>
  <button class="btn btn-p" style="margin-top:12px" onclick="nextQ()">Question suivante →</button>`;
};
window.answerDecision=function(j){
  const {m,i}=PLAY,q=(m.qs)[i],o=q.opts[j]; PLAY.max+=100; PLAY.pts+=o.pts;
  document.querySelectorAll(".q-opt").forEach((b,k)=>{b.disabled=true; if(q.opts[k].pts>=100)b.classList.add("good"); else if(k===j&&o.pts<100)b.classList.add(o.pts>=50?"sel":"bad");});
  document.getElementById("fb").innerHTML=`<div class="correction"><b>Conséquence :</b> ${o.eff}<br><b>À retenir :</b> ${q.corr}</div>
  <button class="btn btn-p" style="margin-top:12px" onclick="nextQ()">Suite →</button>`;
};
window.answerCalc=function(){
  const s=S(),{m,i}=PLAY,q=(m.etapes)[i]; const v=parseFloat(document.getElementById("calc-in").value.replace(",","."));
  if(isNaN(v)){toast("Entre un nombre");return;}
  PLAY.max+=100;
  const target=q.repDyn?q.repDyn(s):q.rep;
  const tol=q.rel?target*q.tol:q.tol;
  const ok=Math.abs(v-target)<=tol;
  if(ok)PLAY.pts+=100;
  document.getElementById("fb").innerHTML=`<div class="correction"><b>${ok?"✅ Exact !":"❌ Réponse attendue : "+fmt(target)+" "+q.unite+"."}</b> ${q.corr.replace("{PAYS}",PAYS[s.pays].nom)}</div>
  <button class="btn btn-p" style="margin-top:12px" onclick="nextQ()">Suite →</button>`;
  document.getElementById("calc-in").disabled=true;
};
window.nextQ=function(){ PLAY.i++; renderQ(); };
function finishMission(timeout){
  if(PLAY.timer)clearInterval(PLAY.timer);
  const s=S(),{m}=PLAY;
  let score=PLAY.max?Math.round(100*PLAY.pts/PLAY.max):0;
  if(timeout)score=Math.min(score,Math.round(100*PLAY.pts/((m.qs||m.etapes).length*100)));
  const seuil=m.exam?(m.id==="m-exam-conducteur"?75:70):50;
  const reussi=score>=seuil;
  const tUsed=Math.round((Date.now()-PLAY.start)/1000);
  let badgeNews=[];
  if(reussi){
    const prev=s.done[m.id]||0;
    if(score>prev){
      s.done[m.id]=score;
      gainXP(s,m.xp); s.argent+=m.argent; s.rep=Math.min(100,s.rep+Math.round(score/20));
      s.comp[m.comp]=Math.max(s.comp[m.comp]||0,score>=90?2:1);
      s.streak++; if(PLAY.retry)s.retryWin=true;
      s.historique.push({t:"Mission réussie : "+m.titre+" ("+score+"/100)",d:Date.now()});
      badgeNews=checkBadges(s);
      // avancement chantier
      Object.entries(s.chantiers).forEach(([cid,c])=>{ const ch=CHANTIERS.find(x=>x.id===cid);
        if(!c.fini&&ch.phases[c.phase]&&ch.phases[c.phase].m===m.id){ c.phase++; c.scores.push(score);
          if(c.phase>=ch.phases.length){ c.fini=true; const avg=Math.round(c.scores.reduce((a,b)=>a+b,0)/c.scores.length);
            c.note=avg>=85?"A":avg>=70?"B":avg>=55?"C":"D"; s.rep=Math.min(100,s.rep+8);
            s.historique.push({t:"Chantier livré : "+ch.nom+" (note "+c.note+")",d:Date.now()}); }}});
    }
  } else { s.streak=0; s.rep=Math.max(0,s.rep-1); }
  save(s);
  const msg=reussi?(score>=90?"Excellent travail, tu viens de gagner en réputation !":"Bravo ! Mission réussie."):
    "Pas encore, mais tu es sur la bonne voie. Revois la correction et réessaie — ici, tu apprends sans risque réel.";
  root.innerHTML=appShell("missions",`
  <div class="panel" style="text-align:center;padding:34px">
    <div class="confetti">${reussi?(score>=90?"🏆":"🎉"):"📘"}</div>
    <div class="score-big" style="color:${reussi?'var(--terre)':'var(--mineral)'}">${score}<span style="font-size:22px">/100</span></div>
    <h2 style="margin:10px 0 4px">${reussi?"Mission réussie":"Mission à retravailler"}</h2>
    <p class="muted">${m.titre.replace("{DEVISE}",devise(s))} · ⏱️ ${fmtT(tUsed)}${timeout?" · temps écoulé":""}</p>
    <p style="margin:14px auto;max-width:46ch">${msg}</p>
    ${reussi?`<p class="muted">+${m.xp} XP · +${fmt(m.argent)} ${devise(s)} · ${COMP[m.comp].em} ${COMP[m.comp].nom} validé</p>`:""}
    ${badgeNews.map(b=>`<div class="pill terre" style="margin:4px">🏅 Nouveau badge : ${b.nom}</div>`).join("")}
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px">
      <button class="btn btn-p" onclick="go('/missions')">Mission suivante</button>
      <button class="btn btn-g" onclick="go('/mission/${m.id}')">${reussi?"Améliorer mon score":"Réessayer"}</button>
      <button class="btn btn-g" onclick="go('/dash')">Tableau de bord</button>
    </div></div>`);
  PLAY=null;
}

window.quizCours=function(cid,j){
  const c=COURS.find(x=>x.id===cid), s=S();
  const zone=document.getElementById("qz-"+cid);
  zone.querySelectorAll(".q-opt").forEach((b,k)=>{b.disabled=true;if(k===c.quiz.ok)b.classList.add("good");else if(k===j)b.classList.add("bad");});
  if(j===c.quiz.ok){ if(!s.comp[c.comp]){s.comp[c.comp]=1; gainXP(s,20); const nb=checkBadges(s); save(s);
    toast("✅ "+COMP[c.comp].nom+" N1 validé (+20 XP)"); nb.forEach(b=>toast("🏅 Badge : "+b.nom)); }
    else { gainXP(s,10); save(s); toast("✅ Bonne réponse (+10 XP)"); } }
  else toast("❌ Relis le cours et réessaie une autre fois.");
};
/* ---------- CV / CARRIÈRE ---------- */
function vCV(){
  const s=S(); if(!s){go("/auth");return;}
  const chFinis=Object.entries(s.chantiers).filter(([,c])=>c.fini);
  root.innerHTML=appShell("cv",`
  <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
    <a class="btn btn-g btn-sm" href="#/recompenses">🏅 Badges</a>
    <a class="btn btn-g btn-sm" href="#/offres">💼 Offres d'emploi</a>
    <a class="btn btn-g btn-sm" href="#/promotions">📈 Promotions</a>
    <button class="btn btn-g btn-sm" onclick="window.print()">🖨️ Exporter</button></div>
  <div class="cv-doc">
    <div style="display:flex;gap:16px;align-items:center"><div class="avatar-chip" style="background:var(--pierre)">${s.avatar}</div>
    <div><h2>${s.user.nom}</h2><p class="muted">${profNom(s.profil)} · Objectif : ${s.metier} · ${PAYS[s.pays].nom} — ${PAYS[s.pays].norme}</p></div></div>
    <div class="cv-sec">Indicateurs</div>
    <span class="tagchip">Niveau ${s.niveau}</span><span class="tagchip">Réputation ${s.rep}/100</span>
    <span class="tagchip">${Object.keys(s.done).length} missions réussies</span><span class="tagchip">${chFinis.length} chantier(s) livré(s)</span>
    <div class="cv-sec">Compétences validées</div>
    ${Object.keys(s.comp).length?Object.entries(s.comp).map(([k,v])=>`<span class="tagchip">${COMP[k].em} ${COMP[k].nom} — N${v}</span>`).join(""):"<p class='muted'>Aucune pour l'instant — joue tes premières missions !</p>"}
    <div class="cv-sec">Chantiers réalisés</div>
    ${chFinis.length?chFinis.map(([id,c])=>{const ch=CHANTIERS.find(x=>x.id===id);return `<div class="row"><span>🏗️ ${ch.nom}</span><span class="pill ok">Note ${c.note}</span></div>`;}).join(""):"<p class='muted'>Aucun chantier livré.</p>"}
    <div class="cv-sec">Badges</div>
    ${s.badges.length?s.badges.map(id=>{const b=BADGES.find(x=>x.id===id);return `<span class="tagchip">${b.em} ${b.nom}</span>`;}).join(""):"<p class='muted'>Aucun badge.</p>"}
    <div class="cv-sec">Historique de carrière</div>
    ${s.historique.slice(-8).reverse().map(h=>`<div class="row"><span>${h.t}</span><span class="muted">${new Date(h.d).toLocaleDateString("fr-FR")}</span></div>`).join("")}
    <p class="muted" style="margin-top:16px;font-size:11px">CV virtuel généré automatiquement par BTP Life — document pédagogique, ne constitue pas une habilitation officielle.</p>
  </div>`);
}
/* ---------- BADGES ---------- */
function vBadges(){
  const s=S(); if(!s){go("/auth");return;}
  root.innerHTML=appShell("cv",`
  <div class="cote"><i>Récompenses</i> ${s.badges.length}/${BADGES.length} badges</div>
  <h2 style="margin-bottom:16px">Badges & certificats</h2>
  <div class="grid-badges">${BADGES.map(b=>`<div class="badge-tile ${s.badges.includes(b.id)?'':'locked'}"><div class="em">${b.em}</div><b>${b.nom}</b></div>`).join("")}</div>
  <div class="panel" style="margin-top:16px"><h3>📜 Certificats</h3>
  ${[["Certificat Sécurité chantier",["secu1"]],["Certificat Rapport journalier",["rapport"]],["Certificat Excel BTP",["excel"]],["Certificat Lecture de plans",["plans"]]].map(([nom,need])=>{
    const ok=need.every(n=>s.badges.includes(n));
    return `<div class="row"><span>📜 ${nom}</span>${ok?`<span class="pill ok">Obtenu · n° BTL-${Math.abs(hash(nom+s.user.nom))%99999}</span>`:`<span class="pill">badge requis : ${BADGES.find(b=>b.id===need[0]).nom}</span>`}</div>`;
  }).join("")}
  <p class="muted" style="margin-top:8px">Chaque certificat porte la mention : « certificat pédagogique — ne constitue pas une habilitation officielle ».</p></div>`);
}
function hash(s){let h=0;for(let i=0;i<s.length;i++){h=(h<<5)-h+s.charCodeAt(i);h|=0;}return h;}
/* ---------- OFFRES ---------- */
function vOffres(){
  const s=S(); if(!s){go("/auth");return;}
  root.innerHTML=appShell("cv",`
  <div class="cote"><i>Emploi virtuel</i> ${OFFRES.length} offres — ${PAYS[s.pays].nom}</div>
  <h2 style="margin-bottom:16px">Offres d'emploi</h2>
  ${OFFRES.map(o=>{
    const chN=Object.values(s.chantiers).filter(c=>c.fini).length;
    const checks=[["Niveau "+o.req.niveau,s.niveau>=o.req.niveau],["Réputation "+o.req.rep,s.rep>=o.req.rep],
      ...(o.req.chantiers?[["Chantiers réussis : "+o.req.chantiers,chN>=o.req.chantiers]]:[]),
      ...Object.entries(o.req.comp).map(([k,v])=>[COMP[k].nom+" N"+v,(s.comp[k]||0)>=v])];
    const ok=checks.every(c=>c[1]);
    const dejaLa=s.profil===o.profilCible;
    return `<div class="panel"><h3>💼 ${o.titre}</h3><p class="muted" style="margin-bottom:10px">${o.desc}</p>
    ${checks.map(([t,v])=>`<div class="row"><span>${t}</span><span class="pill ${v?'ok':'ko'}">${v?'✔':'✘'}</span></div>`).join("")}
    <div style="margin-top:12px">${dejaLa?`<span class="pill ok">Poste actuel</span>`
      :ok?`<button class="btn btn-p" onclick="postuler('${o.id}')">Postuler (test d'entrée : ${MISSIONS.find(m=>m.id===o.test).titre})</button>`
      :`<span class="pill ko">Candidature refusée d'avance : complète les conditions ci-dessus. Chaque ✘ est ton plan d'action.</span>`}</div></div>`;
  }).join("")}`);
}
window.postuler=function(oid){
  const s=S(); const o=OFFRES.find(x=>x.id===oid);
  s.pendingOffre=oid; save(s);
  celebrate(`<div class="confetti">📨</div><h2>Candidature envoyée !</h2><p class="muted" style="margin-top:8px">Le recruteur a lu ton CV virtuel : « Profil intéressant. Passe le test d'entrée et le poste est à toi. » Réussis <b>${MISSIONS.find(m=>m.id===o.test).titre}</b> avec 70+ pour être embauché.</p>`,
   ()=>go("/mission/"+o.test));
};
/* ---------- PROMOTIONS ---------- */
function vPromos(){
  const s=S(); if(!s){go("/auth");return;}
  const p=PROMOS.find(x=>x.de===s.profil);
  root.innerHTML=appShell("cv",`
  <div class="cote"><i>Carrière</i> Progression réaliste</div>
  <h2 style="margin-bottom:16px">Promotions</h2>
  ${p?(()=>{const pc=condPromoOK(s,p);
    return `<div class="panel"><h3>📈 ${profNom(p.de)} → ${profNom(p.vers)}</h3>
    <div class="row"><span>Missions réussies ≥ ${p.cond.missions}</span><span class="pill ${pc.missOK?'ok':'ko'}">${Object.keys(s.done).length}</span></div>
    <div class="row"><span>Réputation ≥ ${p.cond.rep||0}</span><span class="pill ${pc.repOK?'ok':'ko'}">${s.rep}</span></div>
    ${p.cond.chantiers?`<div class="row"><span>Chantiers réussis ≥ ${p.cond.chantiers}</span><span class="pill ${pc.chOK?'ok':'ko'}">${Object.values(s.chantiers).filter(c=>c.fini).length}</span></div>`:""}
    ${Object.entries(p.cond.comp||{}).map(([k,v])=>`<div class="row"><span>${COMP[k].em} ${COMP[k].nom} ≥ N${v}</span><span class="pill ${(s.comp[k]||0)>=v?'ok':'ko'}">N${s.comp[k]||0}</span></div>`).join("")}
    <div style="margin-top:14px">${pc.ok?`<button class="btn btn-p" onclick="demanderPromo()">Demander ma promotion (examen : ${MISSIONS.find(m=>m.id===p.exam).titre})</button>`
      :`<p class="muted">Complète les conditions manquantes, puis reviens demander ta promotion. Ton supérieur fictif suit tes progrès.</p>`}</div></div>`;})()
   :`<div class="panel"><p>🏆 Tu as atteint le sommet de ce parcours : <b>${profNom(s.profil)}</b>. Prochaine aventure : l'entrepreneuriat (à venir) ou un nouveau parcours de spécialisation.</p></div>`}`);
}
window.demanderPromo=function(){
  const s=S(); const p=PROMOS.find(x=>x.de===s.profil);
  s.pendingPromo=p.vers; save(s);
  celebrate(`<div class="confetti">🤝</div><h2>Entretien accordé</h2><p class="muted" style="margin-top:8px">Ton supérieur : « Ton dossier est solide, ${s.user.nom}. Il reste l'examen. Réussis-le à 70+ et le poste de <b>${profNom(p.vers)}</b> est à toi. »</p>`,
   ()=>go("/mission/"+p.exam));
};
/* embauche/promo après examen réussi */
function checkPending(){
  const s=S(); if(!s)return;
  if(s.pendingPromo){ const p=PROMOS.find(x=>x.vers===s.pendingPromo&&x.de===s.profil);
    if(p&&s.done[p.exam]>=70){ const old=s.profil; s.profil=p.vers; s.pendingPromo=null; s.rep=Math.min(100,s.rep+10);
      s.historique.push({t:"PROMOTION : "+profNom(old)+" → "+profNom(p.vers),d:Date.now()}); checkBadges(s); save(s);
      celebrate(`<div class="confetti">🏆</div><h2>Promotion !</h2><p style="margin-top:8px">Félicitations, tu es maintenant <b>${profNom(p.vers)}</b>. Ton CV est à jour et de nouvelles missions se débloquent.</p>`);}}
  if(s.pendingOffre){ const o=OFFRES.find(x=>x.id===s.pendingOffre);
    if(o&&s.done[o.test]>=70){ const old=s.profil; s.profil=o.profilCible; s.pendingOffre=null; s.rep=Math.min(100,s.rep+10);
      s.historique.push({t:"EMBAUCHE : "+o.titre,d:Date.now()}); checkBadges(s); save(s);
      celebrate(`<div class="confetti">🎉</div><h2>Embauché !</h2><p style="margin-top:8px">« Bienvenue dans l'équipe ! » Tu occupes maintenant le poste : <b>${profNom(o.profilCible)}</b>.</p>`);}}
}
/* ---------- ADMIN (démonstration du moteur administrable) ---------- */
function vAdmin(){
  const s=S(); if(!s){go("/auth");return;}
  root.innerHTML=appShell("dash",`
  <div class="cote"><i>Back-office</i> Démonstration — moteur de missions administrable</div>
  <h2 style="margin-bottom:14px">Espace administrateur</h2>
  <div class="panel"><h3>📊 Statistiques</h3>
    <div class="row"><span>Missions publiées</span><span class="pill">${MISSIONS.length}</span></div>
    <div class="row"><span>Chantiers</span><span class="pill">${CHANTIERS.length}</span></div>
    <div class="row"><span>Offres actives</span><span class="pill">${OFFRES.length}</span></div>
    <div class="row"><span>Référentiels pays</span><span class="pill">${Object.keys(PAYS).length} — ${Object.values(PAYS).map(p=>p.nom).join(", ")}</span></div></div>
  <div class="panel"><h3>➕ Ajouter une mission quiz (sans coder)</h3>
    <p class="muted">Colle un JSON de mission — le moteur la publie instantanément (session en cours).</p>
    <textarea id="adm-json" rows="8" style="font-family:var(--mono);font-size:12px;margin-top:10px">{
 "id":"m-perso-1","cat":"Introduction BTP","titre":"Ma mission test","type":"quiz","niv":1,"xp":30,"argent":1500,"comp":"bases",
 "desc":"Mission créée depuis l'admin.",
 "qs":[{"q":"2 + 2 sacs de ciment = ?","opts":["3","4","5"],"ok":1,"corr":"4 sacs, évidemment. Le moteur est data-driven : n'importe quelle mission se crée ainsi."}]
}</textarea>
    <button class="btn btn-p" style="margin-top:10px" onclick="adminAdd()">Publier la mission</button></div>
  <div class="panel"><h3>🌍 Référentiel pays (lecture)</h3>
    ${Object.entries(PAYS).map(([k,p])=>`<div class="row"><span><b>${p.nom}</b> — ${p.norme}</span><span class="pill">ciment : ${fmt(p.prix.ciment)} ${p.devise}/${p.unSac}</span></div>`).join("")}
    <p class="muted" style="margin-top:8px">En production : CRUD complet des pays, normes, unités, monnaies, bibliothèques de prix, documents types et règles HSE.</p></div>`);
}
window.adminAdd=function(){
  try{ const m=JSON.parse(document.getElementById("adm-json").value);
    if(!m.id||!m.titre||!m.qs)throw 0;
    if(MISSIONS.find(x=>x.id===m.id))throw "dup";
    MISSIONS.push(m); toast("✅ Mission publiée : "+m.titre); }
  catch(e){ toast(e==="dup"?"❌ Cet id de mission existe déjà":"❌ JSON invalide"); }
};
/* ---------- ROUTER ---------- */
function render(){
  const h=location.hash.replace("#","")||"/";
  const [_,page,arg]=h.split("/");
  overlay.innerHTML="";
  if(h==="/"){ vLanding(); return; }
  if(page==="auth"){ vAuth(); return; }
  if(page==="onboarding"){ vOnboarding(arg||1); return; }
  if(page==="logout"){ if(confirm("Effacer la carrière sur cet appareil ?")){try{localStorage.removeItem("btplife");}catch(e){} MEM=null;} go("/"); return; }
  if(!S()){ go("/auth"); return; }
  checkPending();
  ({dash:vDash,missions:()=>arg?vMission(arg):vMissions(),mission:()=>vMission(arg),
    chantiers:vChantiers,chantier:()=>vChantier(arg),academie:vAcademie,cv:vCV,
    recompenses:vBadges,offres:vOffres,promotions:vPromos,admin:vAdmin}[page]||vDash)();
  window.scrollTo(0,0);
}
render();
/* PWA */
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
</script>
